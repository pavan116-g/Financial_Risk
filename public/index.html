<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>RiskWatch // Threat Intelligence Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="device">
  <div class="statusbar"></div>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-hero">
      <svg class="dial-mini" viewBox="0 0 60 60"><use href="#riskDial"/></svg>
      <h1 id="authTitle">Welcome to RiskWatch</h1>
      <p id="authSub">Authenticate to initialize secure access to the threat database.</p>
    </div>

    <div id="authError" class="error-msg hidden"></div>

    <form id="authForm" style="display:flex; flex-direction:column; gap:16px;">
      <div id="nameField" class="field hidden">
        <label for="nameInput">Full Name</label>
        <input id="nameInput" placeholder="e.g. Rahul Kumar" />
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" autocomplete="username" placeholder="e.g. rahul_k" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="At least 6 characters" required />
      </div>
      <button type="submit" class="btn-primary" id="authSubmit">Sign in</button>
    </form>

    <div class="auth-switch">
      <span id="switchPrompt">New here?</span>
      <button type="button" id="switchBtn">Create an account</button>
    </div>
  </div>

  <!-- CARDS SCREEN -->
  <div id="appScreen" class="hidden" style="display:flex; flex-direction:column; flex:1;">
    <div class="app-header">
      <div class="brand">
        <svg class="dial-mini" viewBox="0 0 60 60"><use href="#riskDial"/></svg>
        RiskWatch // THREAT_PORTAL
      </div>
      <button class="logout-btn" id="logoutBtn">End Session</button>
    </div>
    <div class="hello">Operator Session: <span id="whoami"></span></div>

    <div id="feed" class="feed"></div>

    <div class="footer-note">Select any threat vector above to expand its dossier profile. Telemetry tracking is active for compliance auditing.</div>
  </div>
</div>

<!-- Reusable signature "risk dial" icon -->
<svg width="0" height="0" style="position:absolute">
  <symbol id="riskDial" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="26" fill="none" stroke="#2a3552" stroke-width="5"/>
    <circle cx="30" cy="30" r="26" fill="none" stroke="#f2a93b" stroke-width="5"
      stroke-linecap="round" stroke-dasharray="115 163" transform="rotate(-90 30 30)"/>
    <circle cx="30" cy="30" r="4" fill="#e5484d"/>
  </symbol>
</svg>

<script src="/js/app.js"></script>
</body>
</html>
